<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="signup-container">
        <div class="signup-left">
            <h1>Welcome</h1>
            <p>Create your account and get started in minutes.</p>
        </div>

        <div class="signup-right">
            <h2>Sign up</h2>

            <form>
                <div class="form-grid">
                    <div>
                        <label>First Name</label>
                        <input type="text" placeholder="First Name" minlength="2" required>
                    </div>

                    <div>
                        <label>Last Name</label>
                        <input type="text" placeholder="Last Name" minlength="2" required>
                    </div>

                    <div>
                        <label>Email</label>
                        <input type="email" placeholder="Email" required>
                    </div>

                    <div>
                        <label>Phone Number</label>
                        <input type="tel" placeholder="Phone Number" pattern="[0-9]{10}" required>
                    </div>

                    <div class="full">
                        <label>Address</label>
                        <input type="text" placeholder="Address" minlength="5" required>
                    </div>

                    <div>
                        <label>Password</label>
                        <input type="password" placeholder="Password" pattern="(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}"
                            title="Minimum 8 characters, at least one number and one special character" required>
                    </div>

                    <div>
                        <label>Confirm Password</label>
                        <input type="password" placeholder="Confirm Password" required>
                    </div>

                    <div class="full">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" required> Male</label>
                            <label><input type="radio" name="gender"> Female</label>
                            <label><input type="radio" name="gender"> Other</label>
                        </div>
                    </div>

                    <div class="full">
                        <label>Primary Requirement</label>
                        <select required>
                            <option value="">Select an option</option>
                            <option value="Energy Efficiency">Energy Efficiency</option>
                            <option value="Security">Security</option>
                            <option value="Comfort">Comfort</option>
                            <option value="Convenience">Convenience</option>
                        </select>
                    </div>
                </div>

                <div class="button-row">
                    <button type="submit">Create Account</button>
                    <button type="reset">Reset</button>
                </div>

                <div class="switch-page">
                    Already have an account? <a href="login.html">Login</a>
                </div>
            </form>

        </div>
    </div>


</body>

</html>
